<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Local List — Berlin</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #F7F3EE;
    --bg2:       #EDE7DC;
    --ink:       #1E1B17;
    --muted:     #8C8278;
    --border:    #D9D0C4;
    --accent:    #C4501A;
    --accent2:   #4A7C59;
    --tag-bg:    #E8E1D6;
    --white:     #FDFAF7;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Mulish', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .logo {
    font-family: 'Lora', serif;
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  .logo span { color: var(--accent); }

  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 3rem 1.5rem 6rem;
  }

  .screen { display: none; }
  .screen.aktiv { display: block; animation: einblenden 0.35s ease; }

  @keyframes einblenden {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .start-intro { margin-bottom: 2.5rem; }

  .start-label {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .start-titel {
    font-family: 'Lora', serif;
    font-size: clamp(2rem, 5vw, 2.8rem);
    font-weight: 600;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
  }

  .start-titel em { font-style: italic; color: var(--accent); }

  .start-text {
    font-size: 0.9rem;
    color: var(--muted);
    line-height: 1.7;
    max-width: 420px;
  }

  .start-btn {
    display: inline-block;
    margin-top: 2rem;
    background: var(--ink);
    color: var(--white);
    border: none;
    padding: 0.85rem 2rem;
    font-family: 'Mulish', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.15s;
  }

  .start-btn:hover { background: var(--accent); }

  .start-hinweis {
    margin-top: 2.5rem;
    padding-top: 2rem;
    border-top: 1px solid var(--border);
    font-size: 0.75rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .fortschritt {
    display: flex;
    gap: 0.35rem;
    margin-bottom: 2.5rem;
  }

  .f-seg {
    height: 2px;
    flex: 1;
    background: var(--border);
    border-radius: 1px;
    transition: background 0.3s;
  }

  .f-seg.fertig  { background: var(--muted); }
  .f-seg.aktiv-f { background: var(--accent); }

  .frage-nr {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  .frage-text {
    font-family: 'Lora', serif;
    font-size: clamp(1.5rem, 3.5vw, 2rem);
    font-weight: 600;
    line-height: 1.2;
    margin-bottom: 0.4rem;
  }

  .frage-hint {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 1.75rem;
    line-height: 1.5;
  }

  .optionen { display: flex; flex-direction: column; gap: 0.5rem; }

  .opt {
    display: flex;
    align-items: center;
    gap: 0.85rem;
    padding: 0.9rem 1.1rem;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Mulish', sans-serif;
    font-size: 0.88rem;
    color: var(--ink);
    transition: all 0.12s;
    text-align: left;
  }

  .opt:hover { border-color: var(--ink); background: var(--bg2); }
  .opt.gewaehlt { border-color: var(--accent); background: #FBF0EB; color: var(--accent); font-weight: 600; }
  .opt-icon { font-size: 1.1rem; flex-shrink: 0; }

  .quiz-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 2rem;
  }

  .btn-zurueck {
    background: none;
    border: none;
    font-family: 'Mulish', sans-serif;
    font-size: 0.78rem;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: color 0.12s;
    padding: 0.5rem 0;
  }
  .btn-zurueck:hover { color: var(--ink); }

  .btn-weiter {
    background: var(--ink);
    color: var(--white);
    border: none;
    padding: 0.75rem 1.75rem;
    font-family: 'Mulish', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .btn-weiter:hover:not(:disabled) { background: var(--accent); }
  .btn-weiter:disabled { opacity: 0.25; cursor: not-allowed; }

  .ergebnis-header {
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .ergebnis-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
  }

  .ergebnis-titel {
    font-family: 'Lora', serif;
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 600;
    line-height: 1.15;
  }

  .ergebnis-sub {
    margin-top: 0.5rem;
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.6;
  }

  .ort-karte {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem;
    margin-bottom: 0.75rem;
    transition: border-color 0.15s, box-shadow 0.15s;
    animation: einblenden 0.35s ease both;
    overflow: hidden;
  }

  .ort-karte:hover {
    border-color: var(--muted);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .ort-foto {
    width: calc(100% + 2.5rem);
    height: 180px;
    margin: -1.25rem -1.25rem 1.25rem -1.25rem;
    background: var(--bg2);
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .ort-foto.geladen { opacity: 1; }

  .ort-oben {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 0.3rem;
  }

  .ort-name {
    font-family: 'Lora', serif;
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1.2;
  }

  .ort-budget {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--accent2);
    white-space: nowrap;
    padding: 0.2rem 0.5rem;
    background: #EBF3EE;
    border-radius: 3px;
    letter-spacing: 0.03em;
  }

  .ort-meta {
    font-size: 0.74rem;
    color: var(--muted);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    flex-wrap: wrap;
  }

  .ort-kommentar {
    font-size: 0.84rem;
    color: #5C5449;
    line-height: 1.65;
    font-style: italic;
    margin-bottom: 1rem;
    padding-left: 0.75rem;
    border-left: 2px solid var(--border);
  }

  .ort-unten {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .ort-tags { display: flex; gap: 0.35rem; flex-wrap: wrap; }

  .otag {
    font-size: 0.62rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    background: var(--tag-bg);
    color: var(--muted);
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
    border: 1px solid var(--border);
  }

  .otag.highlight {
    background: #FBF0EB;
    color: var(--accent);
    border-color: #E8C4B4;
  }

  .maps-link {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--ink);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.3rem;
    letter-spacing: 0.04em;
    white-space: nowrap;
    padding: 0.4rem 0.85rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--bg);
    transition: all 0.12s;
  }

  .maps-link:hover { background: var(--ink); color: var(--white); border-color: var(--ink); }

  .keine-ergebnisse {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }

  .keine-ergebnisse p:first-child { font-size: 2rem; margin-bottom: 0.75rem; }
  .keine-ergebnisse p:last-child { font-size: 0.85rem; line-height: 1.6; }

  .neu-starten {
    margin-top: 2.5rem;
    display: inline-block;
    font-size: 0.78rem;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1px;
    letter-spacing: 0.04em;
    transition: color 0.12s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'Mulish', sans-serif;
  }
  .neu-starten:hover { color: var(--ink); }

  footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.7rem;
    color: var(--border);
    letter-spacing: 0.05em;
  }

  @media (max-width: 480px) {
    header { padding: 1rem 1.25rem; }
    main { padding: 2rem 1.25rem 5rem; }
    .ort-unten { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">The Local<span>List</span></div>
  <nav style="display:flex;align-items:center;gap:1.5rem;">
    <a href="index.html" style="font-size:0.78rem;color:var(--ink);text-decoration:none;letter-spacing:0.04em;font-weight:600;">Finder</a>
    <a href="liste.html" style="font-size:0.78rem;color:var(--muted);text-decoration:none;letter-spacing:0.04em;" onmouseover="this.style.color='var(--ink)'" onmouseout="this.style.color='var(--muted)'">Alle Orte</a>
  </nav>
</header>

<main>

  <div id="start" class="screen aktiv">
    <div class="start-intro">
      <p class="start-label">Kuratierte Orte · Berlin</p>
      <h1 class="start-titel">Wo gehst du<br>heute <em>essen?</em></h1>
      <p class="start-text">Keine endlosen Listen, keine Algorithmen. Nur Orte die ich selbst kenne, ausgewaehlt fuer genau deinen Moment.</p>
      <button class="start-btn" onclick="zeigeQuiz()">Empfehlung starten &rarr;</button>
    </div>
    <div class="start-hinweis">
      <span>&#10022;</span>
      <span id="anzahl-orte"></span>
    </div>
  </div>

  <div id="quiz" class="screen">
    <div class="fortschritt" id="fortschritt"></div>
    <div id="frage-bereich"></div>
    <div class="quiz-nav">
      <button class="btn-zurueck" id="btn-zurueck" onclick="zurueck()">&larr; Zurueck</button>
      <button class="btn-weiter" id="btn-weiter" onclick="weiter()" disabled>Weiter &rarr;</button>
    </div>
  </div>

  <div id="ergebnisse" class="screen">
    <div class="ergebnis-header">
      <p class="ergebnis-label">Deine Empfehlungen</p>
      <h2 class="ergebnis-titel" id="ergebnis-titel"></h2>
      <p class="ergebnis-sub" id="ergebnis-sub"></p>
    </div>
    <div id="karten-liste"></div>
    <button class="neu-starten" onclick="neuStarten()">&#8635; Neue Suche starten</button>
  </div>

</main>

<footer>The Local List &middot; Berlin</footer>

<script src="data.js"></script>
<script src="places.js"></script>

<script>
const FRAGEN = [
  {
    id: "tageszeit",
    text: "Wann moechtest du hin?",
    hint: "",
    optionen: [
      { wert: "brunch", icon: "☕", label: "Brunch / Cafe" },
      { wert: "lunch",  icon: "🌤", label: "Lunch" },
      { wert: "dinner", icon: "🌙", label: "Dinner" },
    ]
  },
  {
    id: "vibe",
    text: "Wie soll's sich anfuehlen?",
    hint: "Mehrere Antworten moeglich.",
    multi: true,
    optionen: [
      { wert: "entspannt", icon: "🌿", label: "Entspannt & gemuetlich" },
      { wert: "lebendig",  icon: "⚡", label: "Lebendig & laut" },
      { wert: "draussen",  icon: "☀️", label: "Draussen / Terrasse" },
      { wert: "besonders", icon: "✨", label: "Besonderer Abend" },
      { wert: "schnell",   icon: "🚀", label: "Schnell & unkompliziert" },
    ]
  },
  {
    id: "budget",
    text: "Was darf's kosten?",
    hint: "Pro Person, ohne Getraenke.",
    optionen: [
      { wert: "low",  icon: "○",   label: "Bis 10 Euro" },
      { wert: "mid",  icon: "○○",  label: "10 bis 25 Euro" },
      { wert: "high", icon: "○○○", label: "Ueber 25 Euro" },
    ]
  },
];

function berechneScore(ort, antworten) {
  let score = 0;
  if (!ort.tageszeit.includes(antworten.tageszeit)) return -1;
  score += 3;
  const vibes = antworten.vibe || [];
  const vibeMatches = vibes.filter(v => ort.vibe.includes(v)).length;
  if (vibeMatches === 0) return -1;
  score += vibeMatches * 3;
  const budgets = ["low", "mid", "high"];
  const userB = budgets.indexOf(antworten.budget);
  const ortB  = budgets.indexOf(ort.budget);
  const diff  = Math.abs(userB - ortB);
  if (diff === 0) score += 4;
  else if (diff === 1) score += 1;
  if (vibes.includes("besonders") && ort.reservierung) score += 1;
  if (vibes.includes("schnell") && ort.walkin) score += 1;
  if (ort.cashonly && antworten.budget === "high") score -= 1;
  if (ort.vegan) score += 0.5;
  return score;
}

let schritt = 0;
let antworten = {};

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("anzahl-orte").textContent =
    ORTE.length + " kuratierte Orte - persoenlich besucht & bewertet";
});

function zeigScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("aktiv"));
  document.getElementById(id).classList.add("aktiv");
}

function zeigeQuiz() {
  schritt = 0;
  antworten = {};
  zeigScreen("quiz");
  rendereSchritt();
}

function weiter() {
  if (schritt < FRAGEN.length - 1) { schritt++; rendereSchritt(); }
  else { zeigeErgebnisse(); }
}

function zurueck() {
  if (schritt === 0) { zeigScreen("start"); }
  else { schritt--; rendereSchritt(); }
}

function neuStarten() {
  schritt = 0;
  antworten = {};
  zeigScreen("start");
}

function rendereSchritt() {
  const frage = FRAGEN[schritt];
  const fort = document.getElementById("fortschritt");
  fort.innerHTML = FRAGEN.map((_, i) => {
    let cls = "f-seg";
    if (i < schritt) cls += " fertig";
    else if (i === schritt) cls += " aktiv-f";
    return '<div class="' + cls + '"></div>';
  }).join("");
  const istMulti = frage.multi;
  document.getElementById("frage-bereich").innerHTML =
    '<p class="frage-nr">Frage ' + (schritt + 1) + ' von ' + FRAGEN.length + '</p>' +
    '<h2 class="frage-text">' + frage.text + '</h2>' +
    (frage.hint ? '<p class="frage-hint">' + frage.hint + '</p>' : '') +
    '<div class="optionen">' +
    frage.optionen.map(opt =>
      '<button class="opt ' + (istGewaehlt(frage.id, opt.wert) ? "gewaehlt" : "") + '" ' +
      'onclick="waehle(\'' + frage.id + '\', \'' + opt.wert + '\', ' + (!!istMulti) + ')">' +
      '<span class="opt-icon">' + opt.icon + '</span>' +
      '<span>' + opt.label + '</span></button>'
    ).join("") +
    '</div>';
  document.getElementById("btn-zurueck").style.visibility = schritt === 0 ? "hidden" : "visible";
  const btnW = document.getElementById("btn-weiter");
  btnW.textContent = schritt === FRAGEN.length - 1 ? "Empfehlungen zeigen" : "Weiter";
  aktualisiereWeiter();
}

function istGewaehlt(id, wert) {
  const a = antworten[id];
  if (Array.isArray(a)) return a.includes(wert);
  return a === wert;
}

function waehle(id, wert, multi) {
  if (multi) {
    if (!antworten[id]) antworten[id] = [];
    const idx = antworten[id].indexOf(wert);
    if (idx > -1) antworten[id].splice(idx, 1);
    else antworten[id].push(wert);
  } else {
    antworten[id] = wert;
  }
  rendereSchritt();
}

function aktualisiereWeiter() {
  const frage = FRAGEN[schritt];
  const a = antworten[frage.id];
  const hatAntwort = frage.multi ? (a && a.length > 0) : !!a;
  document.getElementById("btn-weiter").disabled = !hatAntwort;
}

function zeigeErgebnisse() {
  zeigScreen("ergebnisse");
  const bewertet = ORTE
    .map(ort => Object.assign({}, ort, { score: berechneScore(ort, antworten) }))
    .filter(ort => ort.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 5);

  const vibeTitel = {
    entspannt: "Ein entspannter Abend",
    lebendig:  "Lebendig & mittendrin",
    draussen:  "Raus an die frische Luft",
    besonders: "Ein Abend den du nicht vergisst",
    schnell:   "Schnell & gut",
  };
  const ersterVibe = (antworten.vibe || [])[0];
  document.getElementById("ergebnis-titel").textContent = vibeTitel[ersterVibe] || "Deine Empfehlungen";
  document.getElementById("ergebnis-sub").textContent = bewertet.length > 0
    ? bewertet.length + " " + (bewertet.length === 1 ? "Ort passt" : "Orte passen") + " zu deinem Moment - persoenlich kuratiert."
    : "";

  const liste = document.getElementById("karten-liste");
  const budgetLabel = { low: "bis 10 Euro", mid: "10-25 Euro", high: "25 Euro+" };

  if (bewertet.length === 0) {
    liste.innerHTML = '<div class="keine-ergebnisse"><p>🤔</p><p>Fuer diese Kombination habe ich gerade keinen passenden Ort. Probier es mit anderen Einstellungen.</p></div>';
    return;
  }

  liste.innerHTML = bewertet.map(function(ort, i) {
    const infoTags = [];
    if (ort.vegan)        infoTags.push('<span class="otag highlight">Vegan friendly</span>');
    if (ort.reservierung) infoTags.push('<span class="otag">Reservierung empfohlen</span>');
    if (ort.walkin)       infoTags.push('<span class="otag">Walk-in moeglich</span>');
    if (ort.cashonly)     infoTags.push('<span class="otag">Cash only</span>');
    if (ort.kueche)       infoTags.push('<span class="otag">' + ort.kueche + '</span>');
    return '<div class="ort-karte" data-name="' + ort.name + '" style="animation-delay:' + (i * 0.07) + 's">' +
      '<div class="ort-foto"></div>' +
      '<div class="ort-oben"><div class="ort-name">' + ort.name + '</div><div class="ort-budget">' + budgetLabel[ort.budget] + '</div></div>' +
      '<div class="ort-meta"><span>' + ort.kiez + '</span></div>' +
      '<p class="ort-kommentar">' + ort.kommentar + '</p>' +
      '<div class="ort-place-info"></div>' +
      '<div class="ort-unten"><div class="ort-tags">' + infoTags.join("") + '</div>' +
      '<a class="maps-link" href="' + ort.maps + '" target="_blank" rel="noopener">&#8599; Maps</a></div></div>';
  }).join("");

  // Places Daten nachladen
  if (typeof ladePlacesDaten === "function") {
    ladePlacesDaten(bewertet, function(ort, daten) {
      var karte = document.querySelector('[data-name="' + ort.name + '"]');
      if (!karte) return;

      // Foto
      if (daten.foto) {
        var fotoEl = karte.querySelector(".ort-foto");
        if (fotoEl) {
          fotoEl.style.backgroundImage = "url(" + daten.foto + ")";
          fotoEl.classList.add("geladen");
        }
      }

      // Info-Block einfuegen
      var infoContainer = karte.querySelector(".ort-place-info");
      if (infoContainer) {
        infoContainer.innerHTML = baueInfoBlock(daten);
      }
    });
  }
}

function initPlaces() {
  injectPlacesCSS();
}

// Startet Places sobald die Seite geladen ist
window.addEventListener("load", function() {
  injectPlacesCSS();
});
